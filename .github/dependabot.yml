version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 5
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "illuminate/*"
      php-quality:
        dependency-type: "development"
        patterns:
          - "pestphp/*"
          - "larastan/*"
          - "laravel/pint"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 5
    groups:
      vue-and-inertia:
        patterns:
          - "vue"
          - "@vue/*"
          - "@inertiajs/*"
      frontend-quality:
        dependency-type: "development"
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript*"
          - "vue-tsc"
          - "@playwright/*"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    groups:
      runtime-images:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 5
    groups:
      github-actions:
        patterns:
          - "*"
