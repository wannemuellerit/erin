name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: redis, pdo_mysql, sodium
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci --no-audit --no-fund

      - name: Audit Composer dependencies
        run: composer audit --locked --no-interaction

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run PHP security static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G

  codeql:
    name: CodeQL JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan Git history and pull-request changes
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  production-image:
    name: Container, SBOM and provenance inputs
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build immutable PHP image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/production/Dockerfile
          target: php
          load: true
          push: false
          tags: erin-app:${{ github.sha }}
          build-args: |
            ERIN_BUILD_SHA=${{ github.sha }}
            ERIN_GOVERNANCE_TRUST_ROOT_SHA256=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
            VITE_APP_NAME=Erin
            VITE_BROADCAST_CONNECTION=reverb
            VITE_REVERB_PUBLIC_KEY=ci-public-key
            VITE_REVERB_HOST=localhost
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https

      - name: Scan production image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: erin-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy findings
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: erin-app:${{ github.sha }}
          format: spdx-json
          output-file: erin-${{ github.sha }}.spdx.json
          upload-artifact: false

      - name: Upload immutable security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: erin-security-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            erin-${{ github.sha }}.spdx.json
            trivy-results.sarif
