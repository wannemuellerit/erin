name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: redis, pdo_mysql, sodium
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci --no-audit --no-fund

      - name: Audit Composer dependencies
        run: composer audit --locked --no-interaction

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run PHP security static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G

  codeql:
    name: CodeQL JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan Git history and pull-request changes
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  production-image:
    name: Container, SBOM and provenance inputs
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build immutable PHP image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/production/Dockerfile
          target: php
          load: true
          push: false
          tags: erin-app:${{ github.sha }}
          build-args: |
            ERIN_BUILD_SHA=${{ github.sha }}
            ERIN_GOVERNANCE_TRUST_ROOT_SHA256=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
            VITE_APP_NAME=Erin
            VITE_BROADCAST_CONNECTION=reverb
            VITE_REVERB_PUBLIC_KEY=ci-public-key
            VITE_REVERB_HOST=localhost
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https

      - name: Scan production image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: erin-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy findings
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@d8a2c0130026bf585de5c176ab8f7ce62d75bf04 # v0.20.7
        with:
          image: erin-app:${{ github.sha }}
          format: spdx-json
          output-file: erin-${{ github.sha }}.spdx.json
          upload-artifact: false

      - name: Upload immutable security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: erin-security-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            erin-${{ github.sha }}.spdx.json
            trivy-results.sarif
