name: release-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Build, attest and sign
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Require immutable release tag
        run: |
          test "${GITHUB_REF_TYPE}" = "tag"
          test -n "${GITHUB_SHA}"
          printf '%s' "${GITHUB_SHA}" | grep -Eq '^[0-9a-f]{40}$'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and publish PHP image by commit
        id: php
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/production/Dockerfile
          target: php
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          build-args: |
            ERIN_BUILD_SHA=${{ github.sha }}
            ERIN_GOVERNANCE_TRUST_ROOT_SHA256=${{ secrets.ERIN_GOVERNANCE_TRUST_ROOT_SHA256 }}
            VITE_APP_NAME=Erin
            VITE_BROADCAST_CONNECTION=reverb
            VITE_REVERB_PUBLIC_KEY=${{ vars.VITE_REVERB_PUBLIC_KEY }}
            VITE_REVERB_HOST=${{ vars.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
            VITE_LIVEKIT_URL=${{ vars.VITE_LIVEKIT_URL }}

      - name: Build and publish Nginx image by commit
        id: nginx
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/production/Dockerfile
          target: nginx
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}
          build-args: |
            ERIN_BUILD_SHA=${{ github.sha }}
            ERIN_GOVERNANCE_TRUST_ROOT_SHA256=${{ secrets.ERIN_GOVERNANCE_TRUST_ROOT_SHA256 }}
            VITE_APP_NAME=Erin
            VITE_BROADCAST_CONNECTION=reverb
            VITE_REVERB_PUBLIC_KEY=${{ vars.VITE_REVERB_PUBLIC_KEY }}
            VITE_REVERB_HOST=${{ vars.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
            VITE_LIVEKIT_URL=${{ vars.VITE_LIVEKIT_URL }}

      - name: Attest PHP image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/app
          subject-digest: ${{ steps.php.outputs.digest }}
          push-to-registry: true

      - name: Attest Nginx image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/nginx
          subject-digest: ${{ steps.nginx.outputs.digest }}
          push-to-registry: true

      - name: Keyless-sign immutable images
        env:
          APP_DIGEST: ${{ steps.php.outputs.digest }}
          NGINX_DIGEST: ${{ steps.nginx.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}/app@${APP_DIGEST}"
          cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}/nginx@${NGINX_DIGEST}"
