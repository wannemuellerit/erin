name: encrypted-backup

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: erin-production-backup
  cancel-in-progress: false

jobs:
  backup:
    name: MySQL and object storage
    environment: production-backup
    runs-on:
      - self-hosted
      - erin
      - production
    timeout-minutes: 90
    steps:
      - name: Checkout backup implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create encrypted offsite snapshot
        env:
          ERIN_BACKUP_CONFIRM: BACKUP_TO_SEPARATE_ENCRYPTED_REPOSITORY
          ERIN_DEPLOY_ENV_FILE: ${{ secrets.ERIN_DEPLOY_ENV_FILE }}
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          RESTIC_PASSWORD_COMMAND: ""
        run: scripts/ops/offsite-backup.sh

      - name: Notify operations on failure
        if: failure()
        env:
          ALERT_WEBHOOK: ${{ secrets.BACKUP_ALERT_WEBHOOK }}
        run: |
          test -n "${ALERT_WEBHOOK}"
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"Erin production backup failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${ALERT_WEBHOOK}"
