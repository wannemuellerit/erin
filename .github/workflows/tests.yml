name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: erin_testing
          MYSQL_USER: erin
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_DEMO_MODE: 'false'
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: erin_testing
      DB_USERNAME: erin
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      PRIVATE_FILESYSTEM_DRIVER: local
      SCOUT_DRIVER: collection
      TELESCOPE_ENABLED: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: redis, pdo_mysql, sodium
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          php artisan migrate --force --no-interaction
          php artisan wayfinder:generate --with-form

      - name: Build production assets
        run: npm run build

      - name: Run CI Checks
        run: composer ci:check

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: erin_e2e
          MYSQL_USER: erin
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_DEBUG: 'false'
      APP_DEMO_MODE: 'true'
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: erin_e2e
      DB_USERNAME: erin
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: array
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      FILESYSTEM_DISK: local
      PRIVATE_FILESYSTEM_DRIVER: local
      SCOUT_DRIVER: collection
      TELESCOPE_ENABLED: 'false'
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: redis, pdo_mysql, sodium
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare deterministic browser data
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          php artisan migrate --force --no-interaction
          php artisan db:seed --class='Database\Seeders\DomainCatalogSeeder' --force --no-interaction
          php artisan db:seed --class='Database\Seeders\DemoDataSeeder' --force --no-interaction
          php artisan db:seed --class='Database\Seeders\BrowserTestSeeder' --force --no-interaction
          php artisan wayfinder:generate --with-form

      - name: Build production assets
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start application
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > storage/logs/e2e-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat storage/logs/e2e-server.log
          exit 1

      - name: Run role, tenant and accessibility flows
        run: npm run test:e2e

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: erin-playwright-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: |
            storage/framework/testing/playwright
            storage/framework/testing/playwright-report
            storage/logs/e2e-server.log
