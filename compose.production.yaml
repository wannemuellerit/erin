name: erin-production

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Erin}
  APP_ENV: production
  APP_KEY: ${APP_KEY:?APP_KEY must be set}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?APP_URL must be set}
  APP_DEMO_MODE: "false"
  APP_LOCALE: ${APP_LOCALE:-de}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_MAINTENANCE_DRIVER: cache
  APP_MAINTENANCE_STORE: redis
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
  LOG_CHANNEL: stderr
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-erin}
  DB_USERNAME: ${DB_USERNAME:-erin}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
  SESSION_HTTP_ONLY: "true"
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
  QUEUE_CONNECTION: redis
  REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-180}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID:?REVERB_APP_ID must be set}
  REVERB_APP_KEY: ${REVERB_APP_KEY:?REVERB_APP_KEY must be set}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:?REVERB_APP_SECRET must be set}
  REVERB_HOST: reverb
  REVERB_PORT: 8080
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  SCOUT_DRIVER: meilisearch
  SCOUT_QUEUE: "true"
  SCOUT_AFTER_COMMIT: "true"
  MEILISEARCH_HOST: http://meilisearch:7700
  MEILISEARCH_KEY: ${MEILISEARCH_KEY:?MEILISEARCH_KEY must be set}
  FILESYSTEM_DISK: s3
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}
  AWS_BUCKET: ${AWS_BUCKET:-erin-private}
  AWS_ENDPOINT: http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  CLAMAV_HOST: clamav
  CLAMAV_PORT: 3310
  CLAMAV_TIMEOUT: ${CLAMAV_TIMEOUT:-30}
  MAIL_MAILER: smtp
  MAIL_HOST: ${MAIL_HOST:?MAIL_HOST must be set}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_SCHEME: ${MAIL_SCHEME:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?MAIL_FROM_ADDRESS must be set}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-}
  STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-}
  STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
  STRIPE_PRICE_RECRUITER_SEAT: ${STRIPE_PRICE_RECRUITER_SEAT:-}
  STRIPE_PRICE_VISA_PACKAGE: ${STRIPE_PRICE_VISA_PACKAGE:-}
  ZAMMAD_ENABLED: "${ZAMMAD_ENABLED:-false}"
  ZAMMAD_URL: ${ZAMMAD_URL:-}
  ZAMMAD_TOKEN: ${ZAMMAD_TOKEN:-}
  ZAMMAD_GROUP: ${ZAMMAD_GROUP:-Users}
  ZAMMAD_WEBHOOK_SECRET: ${ZAMMAD_WEBHOOK_SECRET:-}
  ZAMMAD_TIMEOUT: ${ZAMMAD_TIMEOUT:-10}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_PROJECT: ${OPENAI_PROJECT:-}
  OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
  OPENAI_STORE: "false"
  OPENAI_EU_DATA_CONTROLS: ${OPENAI_EU_DATA_CONTROLS:-false}
  OPENAI_DOCUMENT_AI_ENABLED: ${OPENAI_DOCUMENT_AI_ENABLED:-false}
  LIVEKIT_URL: ${LIVEKIT_URL:-}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
  LIVEKIT_REGION: eu
  LIVEKIT_E2EE_REQUIRED: "true"
  VAPID_SUBJECT: ${VAPID_SUBJECT:-}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}

x-app-service: &app-service
  image: ${ERIN_APP_IMAGE:-erin-app}:${ERIN_APP_TAG:-latest}
  build:
    context: .
    dockerfile: docker/production/Dockerfile
    target: php
    args:
      VITE_APP_NAME: ${APP_NAME:-Erin}
      VITE_BROADCAST_CONNECTION: reverb
      VITE_REVERB_PUBLIC_KEY: ${REVERB_APP_KEY:?REVERB_APP_KEY must be set}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:?VITE_REVERB_HOST must be set}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
      VITE_LIVEKIT_URL: ${LIVEKIT_URL:-}
  environment: *app-environment
  volumes:
    - app-runtime:/app/storage
  restart: unless-stopped
  init: true
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    meilisearch:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    clamav:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-erin}
      MYSQL_USER: ${DB_USERNAME:-erin}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot --password="$${MYSQL_ROOT_PASSWORD}" --silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    command:
      - /bin/sh
      - -ec
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --maxmemory-policy noeviction --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes --maxmemory-policy noeviction
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$${REDIS_PASSWORD:-}" ]; then redis-cli --no-auth-warning -a "$${REDIS_PASSWORD}" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.16.0
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?MEILISEARCH_KEY must be set}
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      AWS_BUCKET: ${AWS_BUCKET:-erin-private}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${AWS_BUCKET}" &&
        mc anonymous set none "local/$${AWS_BUCKET}"

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc 127.0.0.1 3310 | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s

  php-fpm:
    <<: *app-service
    command: ["php-fpm", "--nodaemonize"]
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((int) ! @fsockopen('127.0.0.1', 9000));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: ${ERIN_NGINX_IMAGE:-erin-nginx}:${ERIN_APP_TAG:-latest}
    build:
      context: .
      dockerfile: docker/production/Dockerfile
      target: nginx
      args:
        VITE_APP_NAME: ${APP_NAME:-Erin}
        VITE_BROADCAST_CONNECTION: reverb
        VITE_REVERB_PUBLIC_KEY: ${REVERB_APP_KEY:?REVERB_APP_KEY must be set}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:?VITE_REVERB_HOST must be set}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
        VITE_LIVEKIT_URL: ${LIVEKIT_URL:-}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      php-fpm:
        condition: service_healthy
      reverb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/up"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  queue:
    <<: *app-service
    command: ["php", "artisan", "queue:work", "redis", "--queue=high,default,low", "--tries=3", "--timeout=120", "--sleep=1", "--max-time=3600"]
    stop_grace_period: 150s

  scheduler:
    <<: *app-service
    command: ["php", "artisan", "schedule:work"]
    stop_grace_period: 30s

  reverb:
    <<: *app-service
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((int) ! @fsockopen('127.0.0.1', 8080));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    <<: *app-service
    profiles: ["deploy"]
    restart: "no"
    command: ["php", "artisan", "migrate", "--force", "--isolated"]

volumes:
  app-runtime:
  mysql-data:
  redis-data:
  meilisearch-data:
  minio-data:
  clamav-data:
