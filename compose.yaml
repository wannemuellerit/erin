name: erin

x-php-service: &php-service
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    args:
      PHP_VARIANT: cli
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  image: erin-php:dev
  working_dir: /var/www/html
  environment:
    LARAVEL_INSTALLER_DEFER_HOOKS: "true"
    DB_HOST: mysql
    DB_DATABASE: ${DB_DATABASE:-erin}
    DB_USERNAME: ${DB_USERNAME:-erin}
    DB_PASSWORD: ${DB_PASSWORD:-secret}
    REDIS_HOST: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
    REDIS_QUEUE_RETRY_AFTER: 180
    APP_MAINTENANCE_DRIVER: cache
    APP_MAINTENANCE_STORE: redis
    MAIL_MAILER: smtp
    MAIL_HOST: mailpit
    MAIL_PORT: 1025
    FILESYSTEM_DISK: s3
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-erin}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-erin-local-password}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}
    AWS_BUCKET: ${AWS_BUCKET:-erin-private}
    AWS_ENDPOINT: http://minio:9000
    AWS_URL: http://localhost:${MINIO_FORWARD_PORT:-9000}/${AWS_BUCKET:-erin-private}
    AWS_USE_PATH_STYLE_ENDPOINT: "true"
    SCOUT_DRIVER: meilisearch
    SCOUT_QUEUE: "true"
    MEILISEARCH_HOST: http://meilisearch:7700
    MEILISEARCH_KEY: ${MEILISEARCH_KEY:-erin-local-master-key-change-me}
    CLAMAV_HOST: clamav
    CLAMAV_PORT: 3310
    APP_DEMO_MODE: ${APP_DEMO_MODE:-true}
  volumes:
    - .:/var/www/html
  init: true
  restart: unless-stopped

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: erin
      MYSQL_USER: erin
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_FORWARD_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot --password="$${MYSQL_ROOT_PASSWORD}" --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.16.0
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-erin-local-master-key-change-me}
    ports:
      - "${MEILISEARCH_FORWARD_PORT:-7700}:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-erin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-erin-local-password}
    ports:
      - "${MINIO_FORWARD_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_FORWARD_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-erin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-erin-local-password}
      AWS_BUCKET: ${AWS_BUCKET:-erin-private}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${AWS_BUCKET}" &&
        mc anonymous set none "local/$${AWS_BUCKET}"

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    expose:
      - "3310"
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc 127.0.0.1 3310 | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 5000
    ports:
      - "${MAILPIT_FORWARD_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data

  setup:
    <<: *php-service
    restart: "no"
    command: ["sh", "docker/php/setup.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  node-setup:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    command: ["sh", "docker/node/setup.sh"]
    volumes:
      - .:/var/www/html
    restart: "no"

  laravel:
    <<: *php-service
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      setup:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((int) ! @fsockopen('127.0.0.1', 8000));",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  vite:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - .:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    init: true
    restart: unless-stopped
    depends_on:
      node-setup:
        condition: service_completed_successfully
      setup:
        condition: service_completed_successfully

  queue:
    <<: *php-service
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "redis",
        "--queue=high,default,low",
        "--tries=3",
        "--timeout=120",
        "--sleep=1",
        "--max-time=3600",
      ]
    stop_grace_period: 150s
    depends_on:
      setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  scheduler:
    <<: *php-service
    command: ["php", "artisan", "schedule:work"]
    stop_grace_period: 30s
    depends_on:
      setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  reverb:
    <<: *php-service
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_FORWARD_PORT:-8080}:8080"
    depends_on:
      setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((int) ! @fsockopen('127.0.0.1', 8080));",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  php-fpm:
    <<: *php-service
    profiles: ["production"]
    image: erin-php:fpm
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VARIANT: fpm
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: ["php-fpm", "--nodaemonize"]
    expose:
      - "9000"
    depends_on:
      setup:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((int) ! @fsockopen('127.0.0.1', 9000));",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:1.28-alpine
    profiles: ["production"]
    restart: unless-stopped
    ports:
      - "${NGINX_FORWARD_PORT:-8081}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php-fpm:
        condition: service_started

  pest:
    <<: *php-service
    command: ["sh", "docker/php/test.sh"]
    profiles: ["tools"]
    restart: "no"
    environment:
      APP_ENV: testing
      DB_HOST: mysql
      DB_DATABASE: erin_testing
      DB_USERNAME: ${DB_USERNAME:-erin}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
      PRIVATE_FILESYSTEM_DRIVER: local
      SCOUT_DRIVER: collection
    depends_on:
      setup:
        condition: service_completed_successfully

  phpstan:
    <<: *php-service
    command: ["vendor/bin/phpstan", "analyse", "--memory-limit=1G"]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      setup:
        condition: service_completed_successfully

  wayfinder:
    <<: *php-service
    command: ["php", "artisan", "wayfinder:generate", "--with-form"]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      setup:
        condition: service_completed_successfully

  stripe-cli:
    image: stripe/stripe-cli:v1.43.8
    profiles: ["stripe"]
    command: ["listen", "--forward-to", "http://laravel:8000/billing/webhook"]
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}
    init: true
    restart: "no"
    depends_on:
      laravel:
        condition: service_healthy

  browser-test-setup:
    <<: *php-service
    profiles: ["tools"]
    command: ["sh", "docker/php/browser-test-setup.sh"]
    restart: "no"
    depends_on:
      setup:
        condition: service_completed_successfully

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    profiles: ["tools"]
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    command: ["npm", "run", "test:e2e"]
    environment:
      PLAYWRIGHT_BASE_URL: http://laravel:8000
    volumes:
      - .:/var/www/html
    init: true
    restart: "no"
    depends_on:
      laravel:
        condition: service_healthy
      browser-test-setup:
        condition: service_completed_successfully
      node-setup:
        condition: service_completed_successfully

volumes:
  mysql-data:
  redis-data:
  meilisearch-data:
  minio-data:
  clamav-data:
  mailpit-data:
